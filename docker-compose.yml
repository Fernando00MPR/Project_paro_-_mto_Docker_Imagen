services:
  db:
    image: 'postgres:15-alpine'
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: '${DB_NAME}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'paros_postgres_data:/var/lib/postgresql/data'
    expose:
      - '5432'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${DB_USER} -d ${DB_NAME}'
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn paros_project.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - 'paros_static_volume:/app/staticfiles'
    expose:
      - '8000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  paros_postgres_data:
  paros_static_volume: