{% load i18n %}
<div style="display:flex; align-items:flex-end;">
    <form action="{% url 'set_language' %}" method="post" style="display:flex; align-items:center; gap:6px;">
        {% csrf_token %}
        <input name="next" type="hidden" value="{{ request.get_full_path }}">
        <button type="submit" name="language" value="es"
                style="display:flex; align-items:center; gap:5px; padding:5px 10px;
                       border-radius:7px; border:0.5px solid var(--border); background:transparent;
                       cursor:pointer; font-family:inherit; font-size:12px; font-weight:500;
                       color:var(--text);
                       {% if request.LANGUAGE_CODE == 'es' %}
                           border-color:var(--indigo); color:var(--indigo); background:var(--indigo-lt);
                       {% endif %}">
            🇲🇽 <span>{% trans "Español" %}</span>
        </button>
        <button type="submit" name="language" value="en"
                style="display:flex; align-items:center; gap:5px; padding:5px 10px;
                       border-radius:7px; border:0.5px solid var(--border); background:transparent;
                       cursor:pointer; font-family:inherit; font-size:12px; font-weight:500;
                       color:var(--text);
                       {% if request.LANGUAGE_CODE == 'en' %}
                           border-color:var(--indigo); color:var(--indigo); background:var(--indigo-lt);
                       {% endif %}">
            🇺🇸 <span>{% trans "Inglés" %}</span>
        </button>
    </form>
</div>
