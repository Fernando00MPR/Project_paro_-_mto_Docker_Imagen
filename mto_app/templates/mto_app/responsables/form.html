{% extends 'menu_app/base_menu.html' %}
{% load i18n %}
{% block content %}
<div style="margin-bottom:20px;">
    <a href="{% url 'mto:lista_responsables' %}{% if area_id %}?area={{ area_id }}{% endif %}"
       class="btn btn-ghost btn-sm">← {% trans "Volver" %}</a>
</div>

<h1 class="page-title" style="margin-bottom:20px;">
    {% if responsable %}{% trans "Editar responsable" %}{% else %}{% trans "Nuevo responsable" %}{% endif %}
</h1>

<div class="card" style="max-width:520px; padding:24px;">
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="area" value="{{ area_id }}">

        <div class="form-field" style="margin-bottom:16px;">
            <label>{% trans "Numero de nomina" %} *</label>
            <input type="text" name="numero_nomina"
                   value="{{ responsable.numero_nomina|default:'' }}"
                   required placeholder="Ej: 11481">
        </div>
        <div class="form-field" style="margin-bottom:16px;">
            <label>{% trans "Nombre" %} *</label>
            <input type="text" name="nombre"
                   value="{{ responsable.nombre|default:'' }}"
                   required placeholder="Nombre(s)">
        </div>
        <div class="form-field" style="margin-bottom:16px;">
            <label>{% trans "Apellidos" %} *</label>
            <input type="text" name="apellidos"
                   value="{{ responsable.apellidos|default:'' }}"
                   required placeholder="Apellido paterno y materno">
        </div>
        <div class="form-field" style="margin-bottom:16px;">
            <label>{% trans "Posición" %}</label>
            <input type="text" name="posicion"
                value="{{ responsable.posicion|default:'' }}"
                placeholder="Ej: Tecnico, Supervisor, Lider...">
        </div>
        <div class="form-field" style="margin-bottom:24px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" name="activo"
                       {% if not responsable or responsable.activo %}checked{% endif %}>
                {% trans "Activo" %}
            </label>
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn btn-primary">{% trans "Guardar" %}</button>
            <a href="{% url 'mto:lista_responsables' %}{% if area_id %}?area={{ area_id }}{% endif %}"
               class="btn btn-ghost">{% trans "Cancelar" %}</a>
        </div>
    </form>
</div>
{% endblock %}
